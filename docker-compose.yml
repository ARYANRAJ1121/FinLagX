version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: finlagx_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: finlagx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: finlagx_password
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - finlagx_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finlagx"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: finlagx_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: finlagx_mongo
      MONGO_INITDB_DATABASE: finlagx_news
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - finlagx_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finlagx_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@finlagx.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - finlagx_network
    depends_on:
      timescaledb:
        condition: service_healthy


  mongo-express:
    image: mongo-express:latest
    container_name: finlagx_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: finlagx_mongo
      ME_CONFIG_MONGODB_URL: mongodb://admin:finlagx_mongo@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - finlagx_network
    depends_on:
      mongodb:
        condition: service_healthy


  redis:
    image: redis:7-alpine
    container_name: finlagx_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - finlagx_network
    command: redis-server --appendonly yes

volumes:
  timescale_data:
    driver: local
  mongo_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local

networks:
  finlagx_network:
    driver: bridge